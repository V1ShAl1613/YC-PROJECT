version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legalai
      POSTGRES_USER: legalai
      POSTGRES_PASSWORD: legalai_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgresql://legalai:legalai_secret@postgres:5432/legalai
      FAISS_INDEX_PATH: /data/faiss.index
      FAISS_META_PATH: /data/faiss_meta.pkl
      COURTLISTENER_API_TOKEN: ${COURTLISTENER_API_TOKEN:-}
      INDIAN_KANOON_API_TOKEN: ${INDIAN_KANOON_API_TOKEN:-}
    volumes:
      - vectordata:/data
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  vectordata:
